<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>e-Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0eef8;--bg2:#e8e5f5;--white:#ffffff;
  --card:#ffffff;--accent:#4a6cf7;--accent2:#ff6b35;
  --dark:#1a1a2e;--text:#2d2d44;--muted:#8585a8;
  --border:#dddaf0;--yellow:#f5c842;
  --radius:20px;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:4px}

nav{position:sticky;top:0;z-index:100;background:rgba(240,238,248,.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);height:68px;display:flex;align-items:center;padding:0 40px;gap:20px}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;color:var(--dark);letter-spacing:-1px;flex-shrink:0}
.logo span{color:var(--accent)}
.nav-search{flex:1;max-width:400px;margin:0 auto;display:flex;align-items:center;gap:10px;background:var(--white);border:1.5px solid var(--border);border-radius:50px;padding:9px 18px;transition:border-color .2s}
.nav-search:focus-within{border-color:var(--accent)}
.nav-search input{flex:1;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:.9rem;background:none;color:var(--text)}
.nav-search input::placeholder{color:var(--muted)}
.nav-right{display:flex;align-items:center;gap:12px;margin-left:auto}
.cart-trigger{display:flex;align-items:center;gap:8px;background:var(--accent);color:#fff;border:none;border-radius:14px;padding:10px 20px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.9rem;transition:all .2s}
.cart-trigger:hover{background:#612dc3;transform:translateY(-2px);box-shadow:0 8px 20px rgba(138, 55, 210, 0.678)}
.cart-badge{background:var(--accent2);color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700}

.hero{background:var(--dark);color:#fff;padding:60px 40px;display:flex;align-items:center;justify-content:space-between;gap:40px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;right:-100px;top:-100px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(74,108,247,.4),transparent 70%)}
.hero-sale{position:absolute;top:24px;left:24px;background:var(--yellow);color:var(--dark);font-family:'Syne',sans-serif;font-weight:700;font-size:.7rem;letter-spacing:2px;padding:5px 12px;border-radius:50px}
.hero-content{position:relative;z-index:1}
.hero-lbl{font-size:.75rem;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:12px}
.hero h1{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1rem,2.5vw,1.8rem);line-height:1;letter-spacing:-2px;margin-bottom:16px}
.hero h1 em{color:var(--yellow);font-style:normal}
.hero p{color:rgba(255,255,255,.6);font-size:1rem;max-width:360px;line-height:1.6;margin-bottom:28px}
.hero-btn{background:var(--yellow);color:var(--dark);border:none;border-radius:50px;padding:13px 28px;font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;transition:all .2s}
.hero-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(245,200,66,.4)}
.hero-icon{font-size:7rem;position:relative;z-index:1;filter:drop-shadow(0 20px 40px rgba(0,0,0,.3));animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

.filters{padding:22px 40px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--white)}
.filter-lbl{color:var(--muted);font-size:.8rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-right:6px}
.f-btn{background:var(--bg);border:1.5px solid var(--border);color:var(--muted);border-radius:50px;padding:7px 18px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .2s}
.f-btn:hover{border-color:var(--accent);color:var(--accent)}
.f-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}

main{padding:36px 40px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.sec-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;letter-spacing:-.5px}
.prod-ct{color:var(--muted);font-size:.85rem}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:20px}

.card{background:var(--card);border-radius:var(--radius);border:1.5px solid var(--border);overflow:hidden;display:flex;flex-direction:column;transition:transform .25s,box-shadow .25s,border-color .25s;animation:fadeUp .35s ease both;cursor:pointer}
.card:hover{transform:translateY(-8px);box-shadow:0 24px 56px rgba(74,108,247,.14);border-color:rgba(74,108,247,.3)}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}

.card-img-wrap{background:linear-gradient(135deg,#f5f3ff,#ebe8fc);height:210px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.card-img-wrap img{max-height:170px;max-width:170px;object-fit:contain;transition:transform .35s}
.card:hover .card-img-wrap img{transform:scale(1.1) rotate(-2deg)}
.card-cat-badge{position:absolute;top:12px;left:12px;background:var(--accent);color:#fff;font-size:.68rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:50px}
.wish{position:absolute;top:10px;right:10px;background:var(--white);border:none;border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.1);transition:transform .2s}
.wish:hover{transform:scale(1.15)}
.wish.liked{background:#fff0f0;color:#ef4444}

.card-body{padding:16px;display:flex;flex-direction:column;gap:6px;flex:1}
.c-cat{font-size:.7rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent)}
.c-name{font-size:.9rem;font-weight:600;line-height:1.4;color:var(--dark);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.c-stars{display:flex;align-items:center;gap:6px;margin-top:2px}
.stars{font-size:.8rem;color:var(--yellow)}
.star-ct{font-size:.75rem;color:var(--muted)}

.card-foot{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-top:1.5px solid var(--border)}
.price{font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;color:var(--dark)}
.add-btn{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:9px 16px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.85rem;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s}
.add-btn:hover{background:#3a5ce6;transform:scale(1.05)}
.add-btn.added{background:#22c55e}

.loader-wrap{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;gap:16px;padding:80px 0}
.loader{width:42px;height:42px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* CART */
.ov{position:fixed;inset:0;background:rgba(26,26,46,.35);z-index:200;opacity:0;pointer-events:none;backdrop-filter:blur(6px);transition:opacity .25s}
.ov.open{opacity:1;pointer-events:all}
.cart-panel{position:fixed;right:0;top:0;bottom:0;width:min(460px,100vw);background:var(--white);border-left:1.5px solid var(--border);z-index:201;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:-20px 0 60px rgba(74,108,247,.12)}
.cart-panel.open{transform:none}
.cart-hdr{padding:24px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cart-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem}
.close-x{background:var(--bg);border:1.5px solid var(--border);color:var(--text);border-radius:12px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;transition:all .2s}
.close-x:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.cart-list{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
.empty-cart{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);padding:60px 0}
.empty-cart .ei{font-size:3.5rem;opacity:.4}

.ci{background:var(--bg);border:1.5px solid var(--border);border-radius:16px;padding:14px;display:flex;gap:14px;align-items:flex-start;animation:fadeUp .2s ease both}
.ci-img{background:#fff;border-radius:12px;width:68px;height:68px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1px solid var(--border)}
.ci-img img{max-width:56px;max-height:56px;object-fit:contain}
.ci-info{flex:1;display:flex;flex-direction:column;gap:3px}
.ci-brand{font-size:.68rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent)}
.ci-name{font-size:.85rem;font-weight:600;color:var(--dark);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3}
.ci-price{color:var(--accent);font-family:'Syne',sans-serif;font-weight:700;font-size:1.05rem;margin-top:2px}
.qty-row{display:flex;align-items:center;gap:8px;margin-top:6px}
.q-btn{background:var(--white);border:1.5px solid var(--border);color:var(--dark);border-radius:8px;width:26px;height:26px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:all .15s;font-weight:700}
.q-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.q-val{font-weight:700;font-size:.9rem;min-width:20px;text-align:center}
.rm{background:none;border:none;cursor:pointer;color:var(--muted);font-size:1.1rem;padding:4px;transition:color .15s;flex-shrink:0}
.rm:hover{color:#ef4444}

.cart-foot{padding:22px;border-top:1.5px solid var(--border);display:flex;flex-direction:column;gap:14px}
.promo-row{display:flex;gap:10px}
.promo-in{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--text);outline:none}
.promo-in:focus{border-color:var(--accent)}
.promo-apply{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:10px 18px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.85rem;cursor:pointer;transition:all .2s}
.promo-apply:hover{background:#3a5ce6}
.totals{background:var(--bg);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:8px}
.t-row{display:flex;justify-content:space-between;font-size:.85rem;color:var(--muted)}
.t-row span:last-child{color:var(--text);font-weight:500}
.t-grand{display:flex;justify-content:space-between;align-items:baseline;padding-top:10px;border-top:1.5px dashed var(--border);margin-top:4px}
.t-lbl{font-family:'Syne',sans-serif;font-weight:700}
.t-amt{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;color:var(--accent)}
.checkout-btn{background:var(--accent);color:#fff;border:none;border-radius:14px;padding:16px;font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;width:100%;transition:all .2s}
.checkout-btn:hover{background:#3a5ce6;transform:translateY(-2px);box-shadow:0 8px 24px rgba(74,108,247,.3)}
.clear-btn{background:none;border:1.5px solid var(--border);color:var(--muted);border-radius:14px;padding:11px;font-family:'DM Sans',sans-serif;font-size:.85rem;cursor:pointer;width:100%;transition:all .2s}
.clear-btn:hover{border-color:#ef4444;color:#ef4444}

/* MODAL */
.m-ov{position:fixed;inset:0;background:rgba(26,26,46,.55);z-index:300;opacity:0;pointer-events:none;backdrop-filter:blur(8px);transition:opacity .25s;display:flex;align-items:center;justify-content:center;padding:20px}
.m-ov.open{opacity:1;pointer-events:all}
.modal{background:var(--white);border-radius:24px;width:min(700px,100%);max-height:90vh;overflow-y:auto;display:flex;position:relative;animation:mIn .3s ease}
@keyframes mIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
.m-img-col{width:42%;flex-shrink:0;background:linear-gradient(135deg,#f5f3ff,#ebe8fc);display:flex;align-items:center;justify-content:center;padding:40px;border-radius:24px 0 0 24px}
.m-img-col img{max-width:100%;max-height:250px;object-fit:contain}
.m-info{padding:36px;display:flex;flex-direction:column;gap:14px;flex:1;overflow-y:auto}
.m-close{position:absolute;top:14px;right:14px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;width:36px;height:36px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:1}
.m-close:hover{background:var(--dark);color:#fff;border-color:var(--dark)}
.m-cat{font-size:.7rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent)}
.m-name{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;line-height:1.3;color:var(--dark)}
.m-price{font-family:'Syne',sans-serif;font-weight:800;font-size:2rem;color:var(--accent)}
.m-desc{color:var(--muted);font-size:.88rem;line-height:1.7}
.m-rating{display:flex;align-items:center;gap:8px}
.dots{display:flex;gap:8px}
.dot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all .2s}
.dot.sel{border-color:var(--dark);transform:scale(1.2)}
.sizes{display:flex;gap:8px;flex-wrap:wrap}
.sz{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:6px 14px;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s}
.sz.sel,.sz:hover{background:var(--dark);color:#fff;border-color:var(--dark)}
.m-add{background:var(--accent);color:#fff;border:none;border-radius:14px;padding:14px;font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;width:100%;transition:all .2s;margin-top:auto}
.m-add:hover{background:#991ad4;box-shadow:0 8px 20px rgba(74,108,247,.3)}
.m-add.added{background:#22c55e}
.promo-tag{background:var(--accent2);color:#fff;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:50px;letter-spacing:1px}

/* TOAST */
.toasts{position:fixed;bottom:24px;right:24px;z-index:400;display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.toast{background:var(--dark);color:#fff;border-radius:14px;padding:12px 20px;font-size:.88rem;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:tIn .3s ease,tOut .3s ease 2.6s both;max-width:280px}
@keyframes tIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
@keyframes tOut{to{opacity:0;transform:translateX(20px)}}

@media(max-width:700px){
  nav{padding:0 16px}
  .nav-search{display:none}
  .hero{padding:36px 16px;flex-direction:column}
  .hero-icon{display:none}
  main,.filters{padding-left:16px;padding-right:16px}
  .modal{flex-direction:column}
  .m-img-col{width:100%;border-radius:24px 24px 0 0;padding:24px}
  .m-info{padding:20px}
}
</style>
</head>
<body>

<nav>
  <div class="logo">e-<span>Shop</span></div>
  <div class="nav-search">
    <span style="color:var(--muted)">🔍</span>
    <input type="text" id="searchInput" placeholder="Search products…" oninput="filterAll()">
  </div>
  <div class="nav-right">
    <button class="cart-trigger" onclick="toggleCart()">
      🛍️  Cart <span class="cart-badge" id="cartCount">0</span>
    </button>
  </div>
</nav>

<section class="hero">
  <div class="hero-sale">BLACK FRIDAY</div>
  <div class="hero-content">
    <p class="hero-lbl">New Arrivals 2026</p>
    <h1>B<em>ROWSE</em></h1>
    <h1>D<em>EALS</em></h1>
    <h1>C<em>HOOSE</em></h1>
    <h1>O<em>PTIONS</em></h1>
    <h1>E<em>NJOY</em></h1>
<marquee><p>FOR BDCOE MEMBERS 25% DISCOUNT</p></marquee>
    <button class="hero-btn" onclick="document.querySelector('main').scrollIntoView({behavior:'smooth'})">Shop Now →</button>
  </div>
  <div class="hero-icon">🛍️ </div>
</section>

<div class="filters">
  <span class="filter-lbl">Filter:</span>
  <button class="f-btn active" onclick="setCategory('all',this)">All</button>
  <button class="f-btn" onclick="setCategory('electronics',this)">Electronics</button>
  <button class="f-btn" onclick="setCategory('jewelery',this)">Jewelry</button>
  <button class="f-btn" onclick="setCategory(`men's clothing`,this)">Men's</button>
  <button class="f-btn" onclick="setCategory(`women's clothing`,this)">Women's</button>
</div>

<main>
  <div class="sec-hdr">
    <h2 class="sec-title">All Products</h2>
    <span class="prod-ct" id="prodCt"></span>
  </div>
  <div class="grid" id="grid">
    <div class="loader-wrap"><div class="loader"></div><p style="color:var(--muted)">Loading products…</p></div>
  </div>
</main>

<!-- OVERLAY + CART -->
<div class="ov" id="ov" onclick="toggleCart()"></div>
<div class="cart-panel" id="cartPanel">
  <div class="cart-hdr">
    <h2 class="cart-title">Shopping Bag 🛍</h2>
    <button class="close-x" onclick="toggleCart()">✕</button>
  </div>
  <div class="cart-list" id="cartList"></div>
  <div class="cart-foot" id="cartFoot" style="display:none">
    <div class="promo-row">
      <input class="promo-in" id="promoIn" type="text" placeholder="Promo Code…">
      <button class="promo-apply" onclick="applyPromo()">Apply</button>
    </div>
    <div class="totals">
      <div class="t-row"><span>Subtotal</span><span id="subtotal">$0.00</span></div>
      <div class="t-row"><span>Shipping</span><span>$5.12 USD</span></div>
      <div class="t-grand">
        <span class="t-lbl">Bag Total (<span id="itemCt">0</span> items)</span>
        <span class="t-amt" id="grandTotal">$0.00</span>
      </div>
    </div>
    <button class="checkout-btn" onclick="checkout()">Proceed To Checkout →</button>
    <button class="clear-btn" onclick="clearCart()">Clear Cart</button>
  </div>
</div>

<!-- MODAL -->
<div class="m-ov" id="mOv" onclick="maybeCloseModal(event)">
  <div class="modal" id="modal">
    <button class="m-close" onclick="closeModal()">✕</button>
    <div class="m-img-col"><img id="mImg" src="" alt=""></div>
    <div class="m-info">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div class="m-cat" id="mCat"></div>
        <span class="promo-tag">Promo Exclusion</span>
      </div>
      <div class="m-name" id="mName"></div>
      <div class="m-price" id="mPrice"></div>
      <div class="m-rating">
        <span class="stars" id="mStars"></span>
        <span style="color:var(--muted);font-size:.8rem" id="mRateCt"></span>
      </div>
      <div>
        <p style="font-size:.72rem;font-weight:700;letter-spacing:1px;color:var(--muted);margin-bottom:8px">COLOR</p>
        <div class="dots" id="mDots"></div>
      </div>
      <div>
        <p style="font-size:.72rem;font-weight:700;letter-spacing:1px;color:var(--muted);margin-bottom:8px">SIZE</p>
        <div class="sizes" id="mSizes"></div>
      </div>
      <p class="m-desc" id="mDesc"></p>
      <button class="m-add" id="mAdd">Add to Cart 🛍</button>
    </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
let allProducts=[], filtered=[], cart=[], activeCat='all';
const COLORS=['#c8b8fc','#ff6b6b','#4ecdc4','#a8d8ea'];
const SIZES=[6,7,8,9,10,11,12];

// ─── INIT
function init(){
  try{ cart=JSON.parse(localStorage.getItem('sneakr_cart')||'[]'); }catch{ cart=[]; }
  updateBadge();
  fetch('https://raw.githubusercontent.com/Sanyam26362/TOWNHALL_TASK_APIs/refs/heads/main/products.json')

    .then(r=>{ if(!r.ok) throw 0; return r.json(); })
    .then(data=>{ allProducts=data; filtered=[...data]; render(); })
    .catch(()=>{ document.getElementById('grid').innerHTML='<div class="loader-wrap"><p style="color:#ef4444">⚠️ Failed to load. Check connection.</p></div>'; });
}

// ─── RENDER
function render(){
  const g=document.getElementById('grid');
  const ct=document.getElementById('prodCt');
  ct.textContent=`${filtered.length} product${filtered.length!==1?'s':''}`;
  if(!filtered.length){ g.innerHTML='<div class="loader-wrap"><p style="color:var(--muted)">No products found.</p></div>'; return; }
  g.innerHTML=filtered.map((p,i)=>{
    const inCart=cart.some(c=>c.id===p.id);
    const r=Math.round(p.rating?.rate||0);
    return `<div class="card" style="animation-delay:${i*.04}s">
      <div class="card-img-wrap" onclick="openModal(${p.id})">
        <span class="card-cat-badge">${p.category.split(' ')[0].toUpperCase()}</span>
        <button class="wish" onclick="event.stopPropagation();this.classList.toggle('liked');this.textContent=this.classList.contains('liked')?'❤':'♡'">♡</button>
        <img src="${p.image}" alt="${esc(p.title)}" loading="lazy">
      </div>
      <div class="card-body" onclick="openModal(${p.id})">
        <div class="c-cat">${p.category}</div>
        <div class="c-name">${esc(p.title)}</div>
        <div class="c-stars"><span class="stars">${'★'.repeat(r)+'☆'.repeat(5-r)}</span><span class="star-ct">(${p.rating?.count||0})</span></div>
      </div>
      <div class="card-foot">
        <div class="price">$${p.price.toFixed(2)}</div>
        <button class="add-btn${inCart?' added':''}" id="ab${p.id}" onclick="event.stopPropagation();addToCart(${p.id})">${inCart?'✓ Added':'+ Add'}</button>
      </div>
    </div>`;
  }).join('');
}

// ─── FILTER
function setCategory(cat,btn){
  activeCat=cat;
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filterAll();
}
function filterAll(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  filtered=allProducts.filter(p=>(activeCat==='all'||p.category===activeCat)&&(!q||p.title.toLowerCase().includes(q)||p.category.toLowerCase().includes(q)));
  render();
}

// ─── CART OPS
function addToCart(id){
  const p=allProducts.find(x=>x.id===id); if(!p) return;
  const ex=cart.find(c=>c.id===id);
  if(ex) ex.qty++; else cart.push({...p,qty:1});
  save(); updateBadge();
  const btn=document.getElementById('ab'+id);
  if(btn){btn.classList.add('added');btn.textContent='✓ Added';}
  toast('✅ Added to cart!');
}
function removeItem(id){
  cart=cart.filter(c=>c.id!==id); save(); updateBadge(); renderCart(); render();
  toast('🗑️ Item removed');
}
function changeQty(id,d){
  const item=cart.find(c=>c.id===id); if(!item) return;
  item.qty+=d;
  if(item.qty<=0){removeItem(id);return;}
  save(); updateBadge(); renderCart();
}
function clearCart(){
  if(!cart.length) return;
  cart=[]; save(); updateBadge(); renderCart(); render();
  toast('🗑️ Cart cleared');
}
function save(){ localStorage.setItem('sneakr_cart',JSON.stringify(cart)); }
function updateBadge(){ document.getElementById('cartCount').textContent=cart.reduce((s,c)=>s+c.qty,0); }

// ─── CART PANEL
function toggleCart(){
  document.getElementById('cartPanel').classList.toggle('open');
  document.getElementById('ov').classList.toggle('open');
  renderCart();
}
function renderCart(){
  const list=document.getElementById('cartList');
  const foot=document.getElementById('cartFoot');
  if(!cart.length){
    list.innerHTML='<div class="empty-cart"><div class="ei">🛍</div><p>Your bag is empty</p></div>';
    foot.style.display='none'; return;
  }
  foot.style.display='flex';
  list.innerHTML=cart.map(item=>`
    <div class="ci">
      <div class="ci-img"><img src="${item.image}" alt="${esc(item.title)}"></div>
      <div class="ci-info">
        <div class="ci-brand">${item.category.split(' ')[0].toUpperCase()}</div>
        <div class="ci-name">${esc(item.title)}</div>
        <div class="ci-price">$${(item.price*item.qty).toFixed(2)}</div>
        <div class="qty-row">
          <button class="q-btn" onclick="changeQty(${item.id},-1)">−</button>
          <span class="q-val">${String(item.qty).padStart(2,'0')}</span>
          <button class="q-btn" onclick="changeQty(${item.id},1)">+</button>
        </div>
      </div>
      <button class="rm" onclick="removeItem(${item.id})">✕</button>
    </div>`).join('');
  const sub=cart.reduce((s,c)=>s+(c.price*c.qty),0);
  document.getElementById('subtotal').textContent=`$${sub.toFixed(2)} USD`;
  document.getElementById('itemCt').textContent=cart.reduce((s,c)=>s+c.qty,0);
  document.getElementById('grandTotal').textContent=`$${(sub+5.12).toFixed(2)} USD`;
}
function applyPromo(){
  const c=document.getElementById('promoIn').value.trim().toUpperCase();
  toast(c==='SNEAKR20'?'🎉 20% discount applied!':'❌ Invalid promo code');
}
function checkout(){
  if(!cart.length){toast('❌ Cart is empty!');return;}
  toast('🎉 Order placed successfully!');
  setTimeout(()=>{cart=[];save();updateBadge();renderCart();toggleCart();},800);
}

// ─── MODAL
let curProd=null;
function openModal(id){
  curProd=allProducts.find(x=>x.id===id); if(!curProd) return;
  const p=curProd;
  document.getElementById('mImg').src=p.image;
  document.getElementById('mCat').textContent=p.category.toUpperCase();
  document.getElementById('mName').textContent=p.title;
  document.getElementById('mPrice').textContent=`$${p.price.toFixed(2)}`;
  const r=Math.round(p.rating?.rate||0);
  document.getElementById('mStars').textContent='★'.repeat(r)+'☆'.repeat(5-r);
  document.getElementById('mRateCt').textContent=`${p.rating?.rate||0}/5 (${p.rating?.count||0} reviews)`;
  document.getElementById('mDesc').textContent=p.description;
  document.getElementById('mDots').innerHTML=COLORS.map((c,i)=>`<div class="dot${i===0?' sel':''}" style="background:${c}" onclick="document.querySelectorAll('.dot').forEach(d=>d.classList.remove('sel'));this.classList.add('sel')"></div>`).join('');
  document.getElementById('mSizes').innerHTML=SIZES.map(s=>`<button class="sz${s===9?' sel':''}" onclick="document.querySelectorAll('.sz').forEach(b=>b.classList.remove('sel'));this.classList.add('sel')">${s}</button>`).join('');
  const inCart=cart.some(c=>c.id===p.id);
  const btn=document.getElementById('mAdd');
  btn.className='m-add'+(inCart?' added':'');
  btn.textContent=inCart?'✓ Already in Cart':'Add to Cart 🛍';
  btn.onclick=()=>{addToCart(p.id);btn.textContent='✓ Already in Cart';btn.classList.add('added');};
  document.getElementById('mOv').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){ document.getElementById('mOv').classList.remove('open'); document.body.style.overflow=''; }
function maybeCloseModal(e){ if(e.target===document.getElementById('mOv')) closeModal(); }

// ─── TOAST
function toast(msg){
  const wrap=document.getElementById('toasts');
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  wrap.appendChild(t); setTimeout(()=>t.remove(),3000);
}
function esc(s){ const d=document.createElement('div');d.textContent=s;return d.innerHTML; }

init();
</script>
</body>
</html>
